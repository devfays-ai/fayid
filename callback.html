<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>Authenticating...</title>
  <style>
    body { background: #060a14; color: #00f0ff; font-family: 'Share Tech Mono', monospace;
      display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
    .msg { text-align: center; font-size: 1.2rem; }
    .spinner { width: 40px; height: 40px; border: 3px solid #7b2fff;
      border-top-color: #00f0ff; border-radius: 50%; animation: spin 0.8s linear infinite; margin: 20px auto; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="msg">
    <div class="spinner"></div>
    <p>Authenticating with Discord...</p>
  </div>
  <script>
    const params = new URLSearchParams(window.location.search);
    const code = params.get('code');
    const state = params.get('state');
    const error = params.get('error');

    if (error) {
      document.querySelector('.msg p').textContent = 'Login cancelled.';
      setTimeout(() => window.close(), 1500);
    } else if (code) {
      if (window.opener) {
        window.opener.postMessage({ type: 'DISCORD_CALLBACK', code, state }, window.location.origin);
        window.close();
      } else {
        // Redirect flow fallback
        window.location.href = '/?code=' + code + '&state=' + state;
      }
    }
  </script>
</body>
</html>
